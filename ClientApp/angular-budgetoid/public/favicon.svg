<svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Budgetoid">
  <style>
    svg { color: #0E5B43; }
    @media (prefers-color-scheme: dark) { svg { color: #149A72; } }
  </style>
  <defs>
    <mask id="halof" maskUnits="userSpaceOnUse" x="0" y="0" width="96" height="96">
      <rect width="96" height="96" fill="#fff"/>
      <polyline points="0,64 32,64 64,32 96,32" fill="none" stroke="#000" stroke-width="9.5"/>
      <circle cx="48" cy="48" r="17" fill="#000"/>
    </mask>
  </defs>
  <!-- Theme-adaptive favicon: forest in light tabs, forest-dark in dark tabs. -->
  <circle cx="48" cy="48" r="32" fill="currentColor" mask="url(#halof)"/>
  <circle cx="48" cy="48" r="8.5" fill="currentColor"/>
</svg>
