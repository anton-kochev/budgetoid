# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
# azd configuration for Budgetoid. The Aspire AppHost is the single service; azd derives the
# Azure Container App (the `api` resource) and its supporting infrastructure from the AppHost
# model. Run `azd infra synth` to materialize the Bicep under ./infra and commit it (IaC).
name: budgetoid
services:
  app:
    language: dotnet
    project: ./BudgetoidApp/AppHost/AppHost.csproj
    host: containerapp
