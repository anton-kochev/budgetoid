name: Deploy

# GitOps: every push to main deploys. `workflow_dispatch` stays for manual re-runs.
# Requires the Azure vars/secrets from `azd pipeline config` + the SWA token (see DEPLOYMENT.md).
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write # OIDC federated login to Azure
  contents: read

jobs:
  # ---- API → Azure Container Apps (via azd) -------------------------------------------------
  deploy-backend:
    name: Deploy API (Azure Container Apps)
    runs-on: ubuntu-latest
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      # azd reads infra parameters from these env vars (config store is empty in CI);
      # they map to infra.parameters.frontend_origin / .google_client_id in the AppHost.
      AZURE_FRONTEND_ORIGIN: ${{ vars.AZURE_FRONTEND_ORIGIN }}
      AZURE_GOOGLE_CLIENT_ID: ${{ vars.AZURE_GOOGLE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # NOTE: schema migrations are applied out-of-band for now (see DEPLOYMENT.md Step 3): the EF
      # bundle is run against Postgres using the admin password from Key Vault. Automating it in
      # this pipeline is a hardening follow-up.

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to azd (federated)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Log in to Azure CLI (federated)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy API
        run: azd deploy --no-prompt

  # ---- Frontend → Azure Static Web Apps -----------------------------------------------------
  deploy-frontend:
    name: Deploy frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ClientApp/angular-budgetoid/package-lock.json

      - name: Install dependencies
        working-directory: ClientApp/angular-budgetoid
        run: npm ci

      - name: Test
        working-directory: ClientApp/angular-budgetoid
        run: npm test

      - name: Build
        working-directory: ClientApp/angular-budgetoid
        run: npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # We build with `npm run build` above, so skip Oryx and upload the built
          # output directly. With skip_app_build, the action reads app_location as-is
          # and ignores output_location — so point it straight at the browser dist.
          app_location: ClientApp/angular-budgetoid/dist/angular-budgetoid/browser
          skip_app_build: true
