name: Deploy

# Manual trigger until the secrets below are configured (see DEPLOYMENT.md). Once ready, you can
# add `push: { branches: ["main"] }` to make deploys fully GitOps.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC federated login to Azure
  contents: read

jobs:
  # ---- API → Azure Container Apps (via azd) + Neon migrations -------------------------------
  deploy-backend:
    name: Deploy API (Azure Container Apps)
    runs-on: ubuntu-latest
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # NOTE: schema migrations are applied out-of-band for now (see DEPLOYMENT.md Step 3) because
      # the Postgres Flexible Server is passwordless (Entra/managed identity). Automating them here
      # means granting this pipeline identity DB access and running the EF bundle with an Entra
      # access token — a hardening follow-up, tracked in the scale-up ladder.

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (federated)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy API
        run: azd deploy --no-prompt

  # ---- Frontend → Azure Static Web Apps -----------------------------------------------------
  deploy-frontend:
    name: Deploy frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClientApp/angular-budgetoid/package-lock.json

      - name: Install dependencies
        working-directory: ClientApp/angular-budgetoid
        run: npm ci

      - name: Test
        working-directory: ClientApp/angular-budgetoid
        run: npm test

      - name: Build
        working-directory: ClientApp/angular-budgetoid
        run: npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ClientApp/angular-budgetoid
          output_location: dist/angular-budgetoid/browser
          skip_app_build: true
