name: Deploy

# Manual trigger until the secrets below are configured (see DEPLOYMENT.md). Once ready, you can
# add `push: { branches: ["main"] }` to make deploys fully GitOps.
on:
  workflow_dispatch:

permissions:
  id-token: write # OIDC federated login to Azure
  contents: read

jobs:
  # ---- API → Azure Container Apps (via azd) + Neon migrations -------------------------------
  deploy-backend:
    name: Deploy API (Azure Container Apps)
    runs-on: ubuntu-latest
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # Run schema migrations against Neon BEFORE deploying the new API, using a self-contained
      # EF bundle (per project convention: migrations run from CI, never at API startup).
      - name: Build EF migration bundle
        working-directory: BudgetoidApp
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.0
          dotnet ef migrations bundle \
            --project Infrastructure \
            --startup-project Api \
            --configuration Release \
            --self-contained -r linux-x64 \
            --output ${{ github.workspace }}/efbundle

      - name: Apply migrations to Neon
        run: ${{ github.workspace }}/efbundle --connection "${{ secrets.BUDGETOID_DB_CONNECTION }}"

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (federated)
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider "github" \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy API
        run: azd deploy --no-prompt

  # ---- Frontend → Azure Static Web Apps -----------------------------------------------------
  deploy-frontend:
    name: Deploy frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClientApp/angular-budgetoid/package-lock.json

      - name: Install dependencies
        working-directory: ClientApp/angular-budgetoid
        run: npm ci

      - name: Build
        working-directory: ClientApp/angular-budgetoid
        run: npm run build

      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: ClientApp/angular-budgetoid
          output_location: dist/angular-budgetoid/browser
          skip_app_build: true
